name: KAT Keepalive
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake Render
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 45 "https://kat-app.onrender.com/api/cron" || echo "000")
            echo "Try $i: $code"
            [ "$code" = "200" ] && exit 0
            sleep 15
          done
