// ═══ DAILY REMINDER ═══
async function scheduleDailyReminder() {
  const today = dateKey(new Date());
  const filled = localStorage.getItem('kat_journal_filled_' + today);
  if (filled) { cancelDailyReminder(); return; }

  if (!('Notification' in window)) return;
  const perm = await Notification.requestPermission();
  if (perm !== 'granted') return;

  const now = new Date();
  const target = new Date();
  target.setHours(18, 0, 0, 0);

  const fire = async () => {
    const todayCheck = dateKey(new Date());
    const filledCheck = localStorage.getItem('kat_journal_filled_' + todayCheck);
    if (filledCheck) { cancelDailyReminder(); return; }

    const sound = await idbGet('blobs', 'sound');
    if (sound) {
      try {
        const audio = new Audio(sound);
        audio.play().catch(()=>{});
      } catch(e){}
    }
    new Notification('KAT 🐱', { body: 'Tu n\'as pas encore rempli ton journal aujourd\'hui !', icon: '/favicon.ico' });

    _reminderInterval = setInterval(async () => {
      const todayNow = dateKey(new Date());
      const filledNow = localStorage.getItem('kat_journal_filled_' + todayNow);
      if (filledNow) { cancelDailyReminder(); return; }
      new Notification('KAT 🐱', { body: 'N\'oublie pas ton journal ! 📔' });
    }, 30 * 60 * 1000);
  };

  const delay = target.getTime() - now.getTime();
  if (delay > 0) {
    setTimeout(fire, delay);
  } else {
    await fire();
  }
}
function cancelDailyReminder() {
  clearInterval(_reminderInterval);
  _reminderInterval = null;
}

// ═══ MÉTÉO WIDGET ═══
async function fetchWeatherWidget() {
  try {
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=43.5513&longitude=7.0128&current_weather=true&timezone=Europe/Paris', { signal: AbortSignal.timeout(5000) });
    if (!r.ok) return;
    const d = await r.json();
    const cw = d.current_weather;
    const wcode = cw.weathercode;
    const wEmoji = wcode <= 1 ? '☀️' : wcode <= 3 ? '⛅' : wcode <= 67 ? '🌧️' : wcode <= 77 ? '❄️' : '🌩️';
    const temp = Math.round(cw.temperature);
    let tip = '';
    if (temp > 25) tip = '☀️ Légère, lunettes de soleil';
    else if (wcode > 40 && wcode <= 67) tip = '🌂 Prends un imperméable';
    else if (temp < 15) tip = '🧥 Veste chaude conseillée';
    else tip = '👕 Temps agréable';
    const w = document.getElementById('weather-widget');
    const icon = document.getElementById('weather-icon');
    const tempEl = document.getElementById('weather-temp');
    const tipEl = document.getElementById('weather-tip');
    if (w && icon && tempEl && tipEl) {
      icon.textContent = wEmoji;
      tempEl.textContent = `${temp}°C à Cannes`;
      tipEl.textContent = tip;
      w.style.display = '';
    }
  } catch(e) {}
}

// ═══ VUE À VENIR (UPCOMING) ═══
function renderUpcoming(container) {
  const now = new Date();
  const upcoming = [];
  for (const [dk, evList] of Object.entries(S.events)) {
    const d = parseDate(dk);
    if (d < new Date(now.getFullYear(), now.getMonth(), now.getDate())) continue;
    for (const ev of evList) {
      upcoming.push({ ev, dk });
    }
  }
  upcoming.sort((a, b) => {
    const da = a.dk + 'T' + (a.ev.time || '00:00');
    const db = b.dk + 'T' + (b.ev.time || '00:00');
    return da.localeCompare(db);
  });
  const slice = upcoming.slice(0, 10);
  if (!slice.length) return '';
  let html = '<div class="card" style="margin-top:12px"><div class="section"><div class="section-title">Prochains événements</div>';
  for (const { ev, dk } of slice) {
    const cat = getCat(ev.catId);
    const d = parseDate(dk);
    const dateStr = d.toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' });
    html += `<div class="event-block" data-ev-id="${escHtml(ev.id)}" data-ev-date="${escHtml(dk)}" data-ev-dk="${escHtml(dk)}">
      <div class="event-cat-bar" style="background:${escHtml(cat.color)}"></div>
      <div class="event-info">
        <div class="event-title"></div>
        <div class="event-meta"><span>${escHtml(dateStr)}</span>${ev.time ? `<span>${escHtml(ev.time)}</span>` : ''}</div>
      </div>
    </div>`;
  }
  html += '</div></div>';
  return { html, items: slice };
}

// ═══ COUNTDOWN LIVE ═══
let _countdownTimer = null;
function startCountdownTimer() {
  if (_countdownTimer) clearInterval(_countdownTimer);
  _countdownTimer = setInterval(() => {
    document.querySelectorAll('.countdown-badge').forEach(badge => {
      const block = badge.closest('.event-block');
      if (!block) return;
      const time = block.dataset.evTime;
      if (!time) return;
      const [h, m] = time.split(':').map(Number);
      const now = new Date();
      const diff = h * 60 + m - now.getHours() * 60 - now.getMinutes();
      if (diff > 0 && diff < 60) badge.textContent = diff + ' min';
      else if (diff === 0) badge.textContent = 'Maintenant !';
      else badge.remove();
    });
  }, 60000);
}

// ═══ EXPORT ICS MANUEL ═══
function exportIcsDownload() {
  const L = [
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//KAT//FR',
    'CALSCALE:GREGORIAN','METHOD:PUBLISH',
    'X-WR-CALNAME:KAT 🐱','X-WR-CALDESC:Agenda KAT',
  ];
  for (const [dk, evs] of Object.entries(S.events)) {
    if (!Array.isArray(evs)) continue;
    for (const ev of evs) {
      if (!ev.title) continue;
      const dur = parseInt(ev.duration) || 60;
      const [h, mi] = (ev.time || '09:00').split(':').map(Number);
      const tm = h * 60 + mi + dur;
      const endT = `${String(Math.floor(tm/60)).padStart(2,'0')}:${String(tm%60).padStart(2,'0')}`;
      const toD = (d, t) => {
        const [y,mo,dd] = d.split('-').map(Number);
        const [hh,mm] = (t||'00:00').split(':').map(Number);
        return `${y}${String(mo).padStart(2,'0')}${String(dd).padStart(2,'0')}T${String(hh).padStart(2,'0')}${String(mm).padStart(2,'0')}00`;
      };
      const esc = s => (s||'').replace(/\\/g,'\\\\').replace(/,/g,'\\,').replace(/;/g,'\\;').replace(/\n/g,'\\n');
      L.push('BEGIN:VEVENT',
        `UID:${ev.id||dk+'-x'}@kat`,
        `DTSTART:${toD(dk,ev.time)}`, `DTEND:${toD(dk,endT)}`,
        `SUMMARY:${esc(ev.title)}`,
        `STATUS:CONFIRMED`);
      if (ev.location) L.push(`LOCATION:${esc(ev.location)}`);
      L.push('END:VEVENT');
    }
  }
  L.push('END:VCALENDAR');
  const blob = new Blob([L.join('\r\n')], { type: 'text/calendar' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'kat-agenda.ics';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  toast('📤 Export ICS téléchargé');
}

// ═══ STATS PAR SEMAINE (navigation) ═══
let _statsWeekOffset = 0;
function renderStatsWithNav(container) {
  const now = new Date();
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - ((now.getDay()+6)%7) + _statsWeekOffset * 7);
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate() + i);
    days.push(dateKey(d));
  }

  const evCounts = days.map(dk => eventsForDay(dk).length);
  const maxEv = Math.max(...evCounts, 1);
  const todoData = days.map(dk => {
    const todos = getTodos(dk);
    return { total: todos.length, done: todos.filter(t=>t.done).length };
  });
  const moodEmojis = days.map(dk => (S.journal[dk]||{}).mood || null);
  const dayNames = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

  // Journal streak
  let streak = 0;
  const todayKey = dateKey(new Date());
  let checkD = new Date();
  while (true) {
    const k = dateKey(checkD);
    if (S.journal[k] && (S.journal[k].text || S.journal[k].mood)) { streak++; checkD.setDate(checkD.getDate()-1); }
    else break;
  }

  const weekLabel = parseDate(days[0]).toLocaleDateString('fr-FR', { day:'numeric', month:'short' })
    + ' – ' + parseDate(days[6]).toLocaleDateString('fr-FR', { day:'numeric', month:'short' });

  let html = '<div style="padding:12px;display:flex;flex-direction:column;gap:12px">';

  // Nav semaine
  html += `<div style="display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:var(--radius-sm);padding:10px 16px">
    <button class="nav-arrow" id="stats-prev-week">‹</button>
    <span style="font-weight:700;font-size:14px">${escHtml(weekLabel)}</span>
    <button class="nav-arrow" id="stats-next-week" ${_statsWeekOffset >= 0 ? 'disabled style="opacity:0.3"':''}>›</button>
  </div>`;

  // Streak
  if (streak > 0) {
    html += `<div class="card"><div class="section" style="text-align:center">
      <div style="font-size:28px">🔥</div>
      <div style="font-weight:800;font-size:18px">${streak} jour${streak>1?'s':''} de suite</div>
      <div style="color:var(--text2);font-size:13px">Série journal consécutive</div>
    </div></div>`;
  }

  // Events bar chart
  html += '<div class="card"><div class="section"><div class="section-title">Événements</div>';
  days.forEach((dk, i) => {
    const pct = Math.round(evCounts[i]/maxEv*100);
    html += `<div class="stats-bar-row">
      <div class="stats-bar-label">${dayNames[i]}</div>
      <div class="stats-bar-track"><div class="stats-bar-fill" style="width:${pct}%"></div></div>
      <span style="font-size:12px;color:var(--text2);width:20px;text-align:right">${evCounts[i]}</span>
    </div>`;
  });
  html += '</div></div>';

  // Todos progress
  html += '<div class="card"><div class="section"><div class="section-title">Tâches</div>';
  days.forEach((dk, i) => {
    const {total, done} = todoData[i];
    const pct = total ? Math.round(done/total*100) : 0;
    html += `<div class="stats-bar-row">
      <div class="stats-bar-label">${dayNames[i]}</div>
      <div class="stats-bar-track"><div class="stats-bar-fill" style="width:${pct}%;background:#34C759"></div></div>
      <span style="font-size:12px;color:var(--text2);width:40px;text-align:right">${done}/${total}</span>
    </div>`;
  });
  html += '</div></div>';

  // Mood dots
  html += '<div class="card"><div class="section"><div class="section-title">Humeurs</div>';
  html += '<div style="display:flex;gap:8px;align-items:center">';
  days.forEach((dk, i) => {
    const mood = moodEmojis[i];
    html += `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1">
      <div style="font-size:22px">${mood || '·'}</div>
      <div style="font-size:10px;color:var(--text2)">${dayNames[i]}</div>
    </div>`;
  });
  html += '</div></div></div>';

  const totalEvs = evCounts.reduce((a,b)=>a+b,0);
  const totalDone = todoData.reduce((a,b)=>a+b.done,0);
  const totalTodos = todoData.reduce((a,b)=>a+b.total,0);
  const moodCount = moodEmojis.filter(Boolean).length;
  html += `<div class="card"><div class="section">
    <div class="section-title">Résumé</div>
    <p style="font-size:15px;line-height:1.6;color:var(--text2)">
      📅 ${totalEvs} événement${totalEvs!==1?'s':''}<br>
      ✅ ${totalDone}/${totalTodos} tâches<br>
      📔 ${moodCount} jour${moodCount!==1?'s':''} de journal
    </p>
  </div></div>`;
  html += '</div>';
  container.innerHTML = html;

  document.getElementById('stats-prev-week')?.addEventListener('click', () => { _statsWeekOffset--; renderStatsWithNav(container); });
  document.getElementById('stats-next-week')?.addEventListener('click', () => { if (_statsWeekOffset < 0) { _statsWeekOffset++; renderStatsWithNav(container); } });
}

// ═══ EXPORT JOURNAL PDF ═══
function exportJournalPdf() {
  const entries = Object.entries(S.journal).sort((a,b) => a[0].localeCompare(b[0]));
  if (!entries.length) { toast('Aucune entrée journal'); return; }
  let body = '<style>body{font-family:-apple-system,sans-serif;max-width:600px;margin:auto;padding:32px;color:#1C1C1E}h1{color:#8B5CF6}h2{margin-top:24px;color:#1C1C1E}p{line-height:1.6;color:#3C3C3E}.mood{font-size:24px}</style>';
  body += '<h1>Journal KAT 🐱</h1>';
  for (const [dk, entry] of entries) {
    const d = parseDate(dk);
    const dateStr = d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
    body += `<h2>${escHtml(dateStr)}</h2>`;
    if (entry.mood) body += `<div class="mood">${escHtml(entry.mood)}</div>`;
    if (entry.text) body += `<p>${escHtml(entry.text).replace(/\n/g,'<br>')}</p>`;
  }
  const win = window.open('', '_blank');
  if (win) {
    win.document.write(`<!DOCTYPE html><html><head><title>Journal KAT</title></head><body>${body}</body></html>`);
    win.document.close();
    win.focus();
    win.print();
  }
}

// ═══ DARK MODE INIT ═══
function initDark() {
  const savedDark = S.settings.dark;
  if (savedDark === true) {
    document.documentElement.dataset.dark = '1';
  } else if (savedDark === undefined) {
    // Follow system
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.dataset.dark = '1';
    }
  }
}

function checkAutoBriefing() {
  const today = dateKey(new Date());
  const key = 'kat_briefing_' + today;
  if (!localStorage.getItem(key)) {
    localStorage.setItem(key, '1');
    setTimeout(showBriefing, 1200);
  }
}

  scheduleDailyReminder();
  checkAutoBriefing();
